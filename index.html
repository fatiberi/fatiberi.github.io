<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beril</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            background: #000;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .gradient {
            position: absolute;
            width: 200%;
            height: 200%;
            border-radius: 50%;
            opacity: 0.7;
            filter: blur(30px);
            mix-blend-mode: screen;
        }

        .gradient-1 {
            background: linear-gradient(135deg, #ff006e, #8338ec);
            top: -30%;
            left: -30%;
            animation: float1 15s ease-in-out infinite;
        }

        .gradient-2 {
            background: linear-gradient(135deg, #3a86ff, #fb5607);
            top: -20%;
            right: -30%;
            animation: float2 18s ease-in-out infinite;
        }

        .gradient-3 {
            background: linear-gradient(135deg, #06ffa5, #fffb96);
            bottom: -30%;
            left: -10%;
            animation: float3 20s ease-in-out infinite;
        }

        .gradient-4 {
            background: linear-gradient(135deg, #fbbf24, #f97316);
            bottom: -10%;
            right: -30%;
            animation: float4 17s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(50px, 100px) rotate(180deg); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-50px, 80px) rotate(180deg); }
        }

        @keyframes float3 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(80px, -50px) rotate(180deg); }
        }

        @keyframes float4 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-80px, -60px) rotate(180deg); }
        }

        .stars {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 3;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
        }

        h1 {
            font-size: 8rem;
            font-weight: 900;
            letter-spacing: 15px;
            background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff, #06ffa5, #fbbf24);
            -webkit-background-clip: text;
            -webkit-text-fill-color: mediumvioletred;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite;
            margin: 0;
        }

        .char {
            display: inline-block;
            animation: charBounce 0.6s ease-in-out infinite;
        }

        .char:nth-child(1) { animation-delay: 0s; }
        .char:nth-child(2) { animation-delay: 0.1s; }
        .char:nth-child(3) { animation-delay: 0.2s; }
        .char:nth-child(4) { animation-delay: 0.3s; }
        .char:nth-child(5) { animation-delay: 0.4s; }

        @keyframes charBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.15); }
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 20px rgba(255, 0, 110, 0.8), 0 0 40px rgba(131, 56, 236, 0.5); }
            50% { text-shadow: 0 0 30px rgba(58, 134, 255, 0.8), 0 0 60px rgba(6, 255, 165, 0.6); }
        }

        .subtitle {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 30px;
            letter-spacing: 2px;
            animation: fadeInSlide 1s ease-out 0.5s forwards;
            opacity: 0;
        }

        @keyframes fadeInSlide {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .particle {
            position: fixed;
            background: radial-gradient(circle, rgba(255,255,255,0.8), transparent);
            border-radius: 50%;
            pointer-events: none;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) scale(0);
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 4rem;
                letter-spacing: 8px;
            }
            .subtitle {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="gradient gradient-1"></div>
        <div class="gradient gradient-2"></div>
        <div class="gradient gradient-3"></div>
        <div class="gradient gradient-4"></div>
    </div>

    <div class="stars" id="stars"></div>

    <div class="container">
        <h1>
            <span class="char">B</span>
            <span class="char">e</span>
            <span class="char">r</span>
            <span class="char">i</span>
            <span class="char">l</span>
        </h1>
    </div>

    <script>
        // Create stars
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 8; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.animationDelay = Math.random() * 3 + 's';
            starsContainer.appendChild(star);
        }

        // Create particles
        const particlesContainer = document.createElement('div');
        document.body.appendChild(particlesContainer);
        
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.top = '100%';
            particle.style.width = Math.random() * 5 + 2 + 'px';
            particle.style.height = particle.style.width;
            const duration = Math.random() * 3 + 4;
            particle.style.animation = `floatUp ${duration}s linear`;
            particlesContainer.appendChild(particle);
            
            setTimeout(() => particle.remove(), duration * 1000);
        }

        setInterval(createParticle, 300);
        for (let i = 0; i < 10; i++) createParticle();
    </script>
</body>
</html>
